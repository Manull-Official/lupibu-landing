<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#FA7C50">
    <meta name="robots" content="noindex,nofollow">
    <meta http-equiv="X-Robots-Tag" content="noindex,nofollow">

    <title>Lupibu</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/styles.css">
    <link rel="icon" type="image/png" href="/assets/favicon.png">

    <style>
        /* ───────── 404 / Referral page-only styles ───────── */

        .page-404 {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        main.r-main {
            flex: 1;
            display: flex;
            align-items: center;
            padding: calc(64px + var(--space-xl)) 0 var(--space-2xl);
            background: linear-gradient(180deg, var(--brand-bg) 0%, var(--white) 100%);
        }

        .r-card {
            max-width: 560px;
            margin: 0 auto;
            text-align: center;
            padding: 0 var(--space-lg);
        }

        .r-eyebrow {
            display: inline-flex;
            align-items: center;
            gap: var(--space-xs);
            padding: 6px var(--space-md);
            background: var(--white);
            color: var(--brand-dark);
            border: 1px solid rgba(250, 124, 80, 0.25);
            border-radius: var(--radius-full);
            font-size: var(--text-micro);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            margin-bottom: var(--space-md);
            box-shadow: var(--shadow-sm);
        }

        .r-eyebrow svg { width: 14px; height: 14px; color: var(--brand); }

        .r-title {
            font-size: var(--text-hero);
            font-weight: 700;
            line-height: 1.15;
            letter-spacing: -0.025em;
            color: var(--gray-900);
            margin-bottom: var(--space-md);
        }

        .r-partner {
            color: var(--brand);
            white-space: nowrap;
        }

        .r-subtitle {
            font-size: var(--text-body);
            color: var(--gray-600);
            line-height: 1.55;
            max-width: 460px;
            margin: 0 auto var(--space-lg);
        }

        .r-cta {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: var(--space-md);
        }

        .r-cta .appstore-badge {
            cursor: pointer;
            border: none;
            background: transparent;
            padding: 0;
        }

        .r-code-row {
            display: inline-flex;
            align-items: center;
            gap: var(--space-sm);
            padding: var(--space-sm) var(--space-md);
            background: var(--white);
            border: 1px solid var(--gray-200);
            border-radius: var(--radius-full);
            font-size: var(--text-small);
            color: var(--gray-700);
            box-shadow: var(--shadow-sm);
        }

        .r-code-label { color: var(--gray-500); }
        .r-code-value {
            font-family: 'SFMono-Regular', ui-monospace, Menlo, monospace;
            font-weight: 600;
            color: var(--gray-900);
            letter-spacing: 0.02em;
        }

        .r-copy-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 28px;
            height: 28px;
            padding: 0;
            background: var(--gray-100);
            border: none;
            border-radius: var(--radius-md);
            color: var(--gray-600);
            cursor: pointer;
            transition: var(--transition-fast);
        }

        .r-copy-btn:hover { background: var(--brand-bg); color: var(--brand); }
        .r-copy-btn.copied { background: rgba(45, 212, 191, 0.15); color: #0FA58E; }
        .r-copy-btn svg { width: 14px; height: 14px; }

        .r-trust {
            margin-top: var(--space-md);
            font-size: var(--text-small);
            color: var(--gray-500);
        }

        .r-loading {
            display: flex;
            justify-content: center;
            padding: var(--space-3xl) 0;
        }

        .r-spinner {
            width: 32px;
            height: 32px;
            border: 3px solid var(--gray-200);
            border-top-color: var(--brand);
            border-radius: 50%;
            animation: r-spin 0.8s linear infinite;
        }

        @keyframes r-spin { to { transform: rotate(360deg); } }

        /* ───────── Plain 404 (no referral path) ───────── */

        .nf-card {
            max-width: 480px;
            margin: 0 auto;
            text-align: center;
            padding: 0 var(--space-lg);
        }

        .nf-code {
            font-size: 4rem;
            font-weight: 700;
            color: var(--brand);
            line-height: 1;
            letter-spacing: -0.04em;
            margin-bottom: var(--space-sm);
        }

        .nf-title {
            font-size: var(--text-section);
            font-weight: 700;
            color: var(--gray-900);
            letter-spacing: -0.02em;
            margin-bottom: var(--space-md);
        }

        .nf-text {
            font-size: var(--text-body);
            color: var(--gray-600);
            line-height: 1.6;
            margin-bottom: var(--space-lg);
        }

        .nf-link {
            display: inline-flex;
            align-items: center;
            gap: var(--space-xs);
            padding: var(--space-md) var(--space-lg);
            background: var(--brand);
            color: var(--white);
            border-radius: var(--radius-full);
            font-weight: 600;
            font-size: var(--text-small);
            box-shadow: 0 4px 14px rgba(250, 124, 80, 0.35);
            transition: var(--transition-base);
        }

        .nf-link:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(250, 124, 80, 0.4);
        }

        @media (max-width: 640px) {
            .r-cta .appstore-img { height: 64px; }
        }
    </style>
</head>

<body class="page-404">
    <!-- Navigation (matches main site, simplified) -->
    <nav class="navbar">
        <div class="container nav-container">
            <a href="/" class="logo">
                <img src="/assets/logo-inline-primary.svg" alt="Lupibu" class="logo-img">
            </a>
        </div>
    </nav>

    <main class="r-main" role="main">
        <div class="container">
            <!-- Loading state — visible until JS resolves the path -->
            <section id="r-loading" class="r-loading" aria-hidden="true">
                <div class="r-spinner" role="status" aria-label="Loading"></div>
            </section>

            <!-- Referral state (/r/<slug>) -->
            <section id="r-referral" class="r-card" hidden>
                <div class="r-eyebrow">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
                    </svg>
                    <span data-r="badge">Special invite</span>
                </div>
                <h1 class="r-title">
                    <span data-r="titlePrefix">A gift from</span>
                    <span class="r-partner" id="r-partner-name"></span>
                </h1>
                <p class="r-subtitle" data-r="subtitle">
                    Download Lupibu and your invite code applies automatically.
                </p>
                <div class="r-cta">
                    <button type="button" class="appstore-badge" id="r-appstore-btn"
                        aria-label="Download Lupibu on the App Store">
                        <img src="/assets/appstore-badge.svg" alt="Download on the App Store" class="appstore-img">
                    </button>
                    <div class="r-code-row" aria-live="polite">
                        <span class="r-code-label" data-r="codeLabel">Code:</span>
                        <span class="r-code-value" id="r-slug-value"></span>
                        <button type="button" class="r-copy-btn" id="r-copy-btn"
                            aria-label="Copy invite code">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                stroke-linecap="round" stroke-linejoin="round" id="r-copy-icon">
                                <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
                                <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
                            </svg>
                        </button>
                    </div>
                    <p class="r-trust" data-r="trust">7-day Pro trial · No credit card</p>
                </div>
            </section>

            <!-- Plain 404 -->
            <section id="r-notfound" class="nf-card" hidden>
                <div class="nf-code">404</div>
                <h1 class="nf-title" data-r="nfTitle">Page not found</h1>
                <p class="nf-text" data-r="nfText">
                    The page you’re looking for doesn’t exist. Let’s get you home.
                </p>
                <a href="/" class="nf-link" data-r="nfHome">Back to Lupibu</a>
            </section>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <a href="/help.html" class="footer-help">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10"/>
                        <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/>
                        <path d="M12 17h.01"/>
                    </svg>
                    <span data-r="help">Help Center</span>
                </a>
            </div>
            <p class="footer-copyright">&copy; 2026 Lupibu</p>
        </div>
    </footer>

    <script>
    (function () {
        'use strict';

        // ── Config ─────────────────────────────────────────────
        // API base — production landing only ever runs on lupibu.com
        // (CORS allowlist on the backend is exactly these origins).
        var API_BASE = 'https://api.lupibu.com/api/v1';
        var APPSTORE_URL = 'https://apps.apple.com/us/app/lupibu/id6758586869';
        // Must match mobile/src/shared/lib/referral.ts:32.
        var CLIPBOARD_SENTINEL = 'lupibu_ref:';
        // Must match backend referral_partners.slug grammar.
        var SLUG_RE = /^[a-z0-9_]{1,64}$/;
        var REFERRAL_PATH_RE = /^\/r\/([^\/?#]+)\/?$/;

        // ── Translations (inline; this page is the only entry point) ─
        var T = {
            en: {
                badge: 'Special invite',
                titlePrefix: 'A gift from',
                titleFallback: 'You’ve got an invite',
                subtitle: 'Download Lupibu and your invite code applies automatically.',
                codeLabel: 'Code:',
                trust: '7-day Pro trial · No credit card',
                nfTitle: 'Page not found',
                nfText: 'The page you’re looking for doesn’t exist. Let’s get you home.',
                nfHome: 'Back to Lupibu',
                help: 'Help Center',
                copied: 'Copied'
            },
            ru: {
                badge: 'Личное приглашение',
                titlePrefix: 'Подарок от',
                titleFallback: 'У вас приглашение в Lupibu',
                subtitle: 'Скачайте Lupibu — промокод применится автоматически.',
                codeLabel: 'Промокод:',
                trust: 'Pro на 7 дней · Без карты',
                nfTitle: 'Страница не найдена',
                nfText: 'Такой страницы не существует. Вернёмся на главную.',
                nfHome: 'На главную Lupibu',
                help: 'Справочный центр',
                copied: 'Скопировано'
            },
            kk: {
                badge: 'Жеке шақыру',
                titlePrefix: 'Сыйлық ',
                titleFallback: 'Сізге Lupibu-ға шақыру келді',
                subtitle: 'Lupibu-ны жүктеп алыңыз — промокод автоматты түрде қолданылады.',
                codeLabel: 'Промокод:',
                trust: 'Pro 7 күн · Картасыз',
                nfTitle: 'Бет табылмады',
                nfText: 'Мұндай бет жоқ. Басты бетке оралайық.',
                nfHome: 'Lupibu басты бетіне',
                help: 'Көмек орталығы',
                copied: 'Көшірілді'
            }
        };

        // Resolve language: ?lang= > localStorage > navigator > 'en'.
        // Mirrors i18n.js detection so a user’s pick on the main site
        // carries over here.
        function detectLang() {
            var url = new URLSearchParams(location.search).get('lang');
            if (url && T[url]) return url;
            try {
                var saved = localStorage.getItem('lupibu-lang');
                if (saved && T[saved]) return saved;
            } catch (_) { /* private mode etc. */ }
            var nav = (navigator.language || '').toLowerCase();
            if (nav.indexOf('ru') === 0) return 'ru';
            if (nav.indexOf('kk') === 0 || nav.indexOf('kz') === 0) return 'kk';
            return 'en';
        }

        function applyTranslations(lang) {
            var dict = T[lang] || T.en;
            document.documentElement.lang = lang;
            document.querySelectorAll('[data-r]').forEach(function (el) {
                var key = el.getAttribute('data-r');
                if (dict[key] !== undefined) el.textContent = dict[key];
            });
        }

        function show(id) {
            ['r-loading', 'r-referral', 'r-notfound'].forEach(function (sectionId) {
                var el = document.getElementById(sectionId);
                if (!el) return;
                if (sectionId === id) {
                    el.hidden = false;
                    el.removeAttribute('aria-hidden');
                } else {
                    el.hidden = true;
                }
            });
        }

        // Parse pathname → slug or null. Strict grammar match prevents
        // round-tripping arbitrary garbage to the API.
        function parseSlugFromPath() {
            var match = REFERRAL_PATH_RE.exec(location.pathname);
            if (!match) return null;
            var raw = decodeURIComponent(match[1]).toLowerCase();
            return SLUG_RE.test(raw) ? raw : null;
        }

        // Validate against the backend. Returns { displayName } on success,
        // null on 404, throws on network/CORS failure (caller falls back to
        // the slug-only render path so the funnel still works).
        function validateSlug(slug) {
            return fetch(
                API_BASE + '/referrals/validate?slug=' + encodeURIComponent(slug),
                { method: 'GET', headers: { 'Accept': 'application/json' } }
            ).then(function (resp) {
                if (resp.status === 404) return null;
                if (!resp.ok) throw new Error('http_' + resp.status);
                return resp.json().then(function (json) {
                    return { displayName: (json && json.display_name) || null };
                });
            });
        }

        // Copy the slug as the clipboard sentinel the mobile app picks up
        // on first launch. Best-effort: failure is non-fatal — the user can
        // still type the code on the Welcome screen manually.
        function copySentinel(slug) {
            var payload = CLIPBOARD_SENTINEL + slug;
            if (navigator.clipboard && navigator.clipboard.writeText) {
                return navigator.clipboard.writeText(payload).catch(function () {});
            }
            // Legacy fallback for older browsers.
            try {
                var ta = document.createElement('textarea');
                ta.value = payload;
                ta.style.position = 'fixed';
                ta.style.opacity = '0';
                document.body.appendChild(ta);
                ta.select();
                document.execCommand('copy');
                document.body.removeChild(ta);
            } catch (_) {}
            return Promise.resolve();
        }

        function flashCopied(lang) {
            var btn = document.getElementById('r-copy-btn');
            if (!btn) return;
            btn.classList.add('copied');
            // Swap icon to a checkmark.
            var icon = document.getElementById('r-copy-icon');
            if (icon) {
                icon.innerHTML = '<polyline points="20 6 9 17 4 12"/>';
            }
            setTimeout(function () {
                btn.classList.remove('copied');
                if (icon) {
                    icon.innerHTML =
                        '<rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>' +
                        '<path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>';
                }
            }, 1800);
        }

        function renderReferral(slug, displayName, lang) {
            var dict = T[lang] || T.en;
            var nameEl = document.getElementById('r-partner-name');
            var titlePrefixEl = document.querySelector('[data-r="titlePrefix"]');

            if (displayName) {
                nameEl.textContent = displayName;
                titlePrefixEl.textContent = dict.titlePrefix;
            } else {
                // API unreachable or partner lookup failed — keep the funnel
                // open with a generic title; the slug still travels via the
                // clipboard sentinel and the backend resolves it on signup.
                titlePrefixEl.textContent = '';
                nameEl.textContent = dict.titleFallback;
            }

            document.getElementById('r-slug-value').textContent = slug;
            show('r-referral');

            var appBtn = document.getElementById('r-appstore-btn');
            appBtn.addEventListener('click', function () {
                copySentinel(slug).then(function () {
                    // Open in a new tab on desktop; same tab on iOS so the
                    // App Store handoff feels instant.
                    var isiOS = /iPhone|iPad|iPod/i.test(navigator.userAgent);
                    if (isiOS) {
                        location.href = APPSTORE_URL;
                    } else {
                        window.open(APPSTORE_URL, '_blank', 'noopener,noreferrer');
                    }
                });
            });

            var copyBtn = document.getElementById('r-copy-btn');
            copyBtn.addEventListener('click', function () {
                copySentinel(slug).then(function () { flashCopied(lang); });
            });
        }

        // ── Boot ───────────────────────────────────────────────
        document.addEventListener('DOMContentLoaded', function () {
            var lang = detectLang();
            applyTranslations(lang);

            var slug = parseSlugFromPath();
            if (!slug) {
                show('r-notfound');
                return;
            }

            validateSlug(slug)
                .then(function (result) {
                    if (result === null) {
                        // Slug grammar OK but partner doesn’t exist /
                        // is inactive. Show the standard 404 — partners
                        // get rotated and we don’t want stale links to
                        // pretend to work.
                        show('r-notfound');
                        return;
                    }
                    renderReferral(slug, result.displayName, lang);
                })
                .catch(function () {
                    // Network / CORS failure: keep the funnel open. The
                    // slug is preserved via clipboard, and the backend
                    // re-validates on /auth/login.
                    renderReferral(slug, null, lang);
                });
        });
    })();
    </script>
</body>

</html>
