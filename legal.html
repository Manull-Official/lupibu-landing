    <style>
        .legal-page {
            padding: calc(80px + var(--space-lg)) 0 var(--space-3xl);
            min-height: 100vh;
        }

        .legal-content {
            max-width: 760px;
            margin: 0 auto;
        }

        .legal-header-row {
            position: relative;
            text-align: center;
            margin-bottom: var(--space-sm);
        }

        .legal-header-row .legal-back {
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
        }

        .legal-content h1 {
            font-size: 1.75rem;
            font-weight: 700;
            color: var(--gray-900);
            margin: 0;
            text-align: center;
        }

        .legal-version {
            text-align: center;
            font-size: 0.875rem;
            color: var(--gray-400);
            margin-bottom: var(--space-xl);
        }

        .legal-content h2 {
            font-size: 1.125rem;
            font-weight: 600;
            color: var(--gray-900);
            margin-top: var(--space-xl);
            margin-bottom: 0.75rem;
        }

        .legal-content p {
            font-size: 0.9375rem;
            line-height: 1.8;
            color: var(--gray-600);
            margin-bottom: var(--space-md);
        }

        .legal-content strong {
            color: var(--gray-800);
        }

        .legal-content ul {
            padding-left: var(--space-lg);
            margin-bottom: var(--space-md);
            list-style: disc;
        }

        .legal-content li {
            font-size: 0.9375rem;
            line-height: 1.8;
            color: var(--gray-600);
            margin-bottom: var(--space-sm);
        }

        .legal-back {
            display: inline-flex;
            align-items: center;
            gap: var(--space-xs);
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--gray-500);
            transition: var(--transition-fast);
            flex-shrink: 0;
        }

        .legal-back:hover {
            color: var(--gray-700);
        }

        .legal-back svg {
            width: 16px;
            height: 16px;
        }
    </style>
</head>

<body>
    <nav class="navbar">
        <div class="container nav-container">
